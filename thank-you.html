<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Application Submitted</title>
<link rel="stylesheet" href="styles.css">
<style>
body{
  background:#f4f6f9;
  font-family:Arial, Helvetica, sans-serif;
  margin:0;
}
.thankyou-wrapper{
  max-width:900px;
  margin:60px auto;
  background:#ffffff;
  border-radius:12px;
  box-shadow:0 4px 20px rgba(0,0,0,0.08);
  padding:40px 30px;
  text-align:center;
}
.thankyou-wrapper img{
  height:110px;
  object-fit:contain;
  margin-bottom:25px;
}
.thankyou-wrapper h1{
  color:#2e7d32;
  font-size:32px;
  margin-bottom:15px;
}
.thankyou-wrapper p{
  font-size:16px;
  color:#333;
  margin-bottom:10px;
}
.btn-primary{
  background:#1e5aa8;
  color:#fff;
  border:none;
  padding:12px 24px;
  border-radius:6px;
  cursor:pointer;
  margin-top:20px;
}
.btn-primary:hover{
  background:#15437f;
}
.btn-danger{
  width:100%;
  background:#d32f2f;
  color:#fff;
  border:none;
  padding:12px;
  border-radius:6px;
  margin-top:30px;
  cursor:pointer;
}
.btn-danger:hover{
  background:#b71c1c;
}
@media(max-width:600px){
  .thankyou-wrapper{
    margin:30px 15px;
    padding:30px 20px;
  }
  .thankyou-wrapper img{
    height:95px;
  }
}
</style>
</head>
<body>

<div class="thankyou-wrapper">
  <img src="logo.png" alt="Terrabit Consulting Logo">
  <h1>Thank You!</h1>
  <p>Your employment registration has been submitted successfully.</p>
  <p>A copy of your submitted data in Excel format has been sent to the email address you provided. Please check your inbox.</p>

  <button class="btn-primary" onclick="window.location.href='index.html'">← Back to Form</button>
  <button class="btn-danger" onclick="window.location.href='logout.html'">Logout</button>
</div>

</body>
</html>
